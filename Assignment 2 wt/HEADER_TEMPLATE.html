<!-- COPY THIS HEADER STRUCTURE TO ALL OTHER HTML PAGES -->
<!-- Replace existing header in: products.html, product-detail.html, cart.html, checkout.html -->

<header class="header">
    <div class="container header-content">
        <div class="header-left">
            <a href="index.html" class="logo">
                <div class="logo-icon">PC</div>
                <span class="logo-text">PC Parts Shop</span>
            </a>
            <nav class="desktop-nav">
                <a href="products.html">All Products</a>
                <a href="products.html?category=gpu">Graphics Cards</a>
                <a href="products.html?category=cpu">Processors</a>
                <a href="products.html?category=motherboard">Motherboards</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="search-bar">
                <input type="search" placeholder="Search products..." class="search-input">
            </div>
            <!-- Login Button with Icon -->
            <a href="login.html" class="nav-icon-btn" id="loginBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
                <span class="nav-text">Login</span>
            </a>
            <!-- Register Button with Icon -->
            <a href="register.html" class="nav-icon-btn" id="registerBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
                <span class="nav-text">Register</span>
            </a>
            <!-- User Section (Hidden by default, shown when logged in) -->
            <div id="userSection" style="display: none;">
                <!-- User buttons will be loaded here by auth.js -->
            </div>
            <!-- Cart Button -->
            <a href="cart.html" class="cart-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-count" id="cartCount">0</span>
            </a>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
        </div>
    </div>
</header>

<!-- ALSO ADD THIS BEFORE CLOSING </body> TAG -->
<script src="auth.js"></script>
