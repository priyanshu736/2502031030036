<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - PC Parts Shop</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .checkout-page {
            padding: 2rem 0;
        }
        
        .checkout-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
        }
        
        .checkout-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        
        .checkout-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-section {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1.5rem;
        }
        
        .form-section-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-label {
            font-weight: 500;
        }
        
        .form-input {
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 1rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .radio-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .radio-option:hover {
            background: #f9fafb;
        }
        
        .radio-option input {
            margin-right: 0.75rem;
        }
        
        .radio-content {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
        }
        
        .radio-label {
            display: flex;
            flex-direction: column;
        }
        
        .radio-label strong {
            display: block;
            font-weight: 600;
        }
        
        .radio-label small {
            font-size: 0.875rem;
            color: #6b7280;
        }
        
        .radio-price {
            font-weight: 600;
        }
        
        .checkout-buttons {
            display: flex;
            gap: 1rem;
        }
        
        .confirmation-page {
            text-align: center;
            padding: 3rem 0;
        }
        
        .confirmation-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            color: #10b981;
        }
        
        .confirmation-page h1 {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        
        .confirmation-page > p {
            font-size: 1.25rem;
            color: #6b7280;
            margin-bottom: 2rem;
        }
        
        .confirmation-summary {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1.5rem;
            max-width: 500px;
            margin: 0 auto 2rem;
            text-align: left;
        }
        
        .confirmation-summary h2 {
            font-weight: bold;
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }
        
        .confirmation-items {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .confirmation-item {
            display: flex;
            justify-content: space-between;
        }
        
        .confirmation-divider {
            height: 1px;
            background: #e5e7eb;
            margin: 1rem 0;
        }
        
        .confirmation-total {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.125rem;
        }
        
        .confirmation-total-value {
            color: #2563eb;
        }
        
        .confirmation-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        @media (min-width: 768px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .form-group-full {
                grid-column: 1 / -1;
            }
        }
        
        @media (min-width: 1024px) {
            .checkout-layout {
                grid-template-columns: 2fr 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <div class="logo-icon">PC</div>
                    <span class="logo-text">PC Parts Shop</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Checkout Page -->
    <div class="checkout-page">
        <div class="container" id="checkoutContent">
            <!-- Content will be loaded here -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                © 2026 PC Parts Shop. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="products-data.js"></script>
    <script src="cart.js"></script>
    <script src="script.js"></script>
    <script>
        let step = 'info'; // 'info', 'payment', or 'confirmation'
        let shippingMethod = 'standard';

        document.addEventListener('DOMContentLoaded', function() {
            const cart = getCart();
            if (cart.items.length === 0) {
                window.location.href = 'cart.html';
                return;
            }
            displayCheckout();
        });

        function displayCheckout() {
            if (step === 'confirmation') {
                displayConfirmation();
            } else {
                displayCheckoutForm();
            }
        }

        function displayCheckoutForm() {
            const cart = getCart();
            const cartItems = cart.items.map(item => {
                const product = products.find(p => p.id === item.productId);
                return { ...item, product };
            }).filter(item => item.product);

            const subtotal = cartItems.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
            const shippingCost = shippingMethod === 'express' ? 19.99 : (subtotal > 50 ? 0 : 9.99);
            const tax = subtotal * 0.08;
            const total = subtotal + shippingCost + tax;

            const formHTML = step === 'info' ? `
                <div class="checkout-form">
                    <div class="form-section">
                        <h2 class="form-section-title">Shipping Information</h2>
                        <form id="shippingForm" onsubmit="handleShippingSubmit(event)">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label" for="firstName">First Name *</label>
                                    <input class="form-input" id="firstName" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="lastName">Last Name *</label>
                                    <input class="form-input" id="lastName" required>
                                </div>
                                <div class="form-group form-group-full">
                                    <label class="form-label" for="email">Email *</label>
                                    <input class="form-input" id="email" type="email" required>
                                </div>
                                <div class="form-group form-group-full">
                                    <label class="form-label" for="address">Street Address *</label>
                                    <input class="form-input" id="address" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="city">City *</label>
                                    <input class="form-input" id="city" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="state">State *</label>
                                    <input class="form-input" id="state" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="zip">ZIP Code *</label>
                                    <input class="form-input" id="zip" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="phone">Phone Number *</label>
                                    <input class="form-input" id="phone" type="tel" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 1.5rem;">
                                Continue to Payment
                            </button>
                        </form>
                    </div>

                    <div class="form-section">
                        <h2 class="form-section-title">Shipping Method</h2>
                        <div class="radio-group">
                            <label class="radio-option">
                                <div class="radio-content">
                                    <input type="radio" name="shipping" value="standard" ${shippingMethod === 'standard' ? 'checked' : ''} onchange="changeShipping('standard')">
                                    <div class="radio-label">
                                        <strong>Standard Shipping</strong>
                                        <small>5-7 business days</small>
                                    </div>
                                </div>
                                <span class="radio-price">${subtotal > 50 ? 'Free' : '$9.99'}</span>
                            </label>
                            <label class="radio-option">
                                <div class="radio-content">
                                    <input type="radio" name="shipping" value="express" ${shippingMethod === 'express' ? 'checked' : ''} onchange="changeShipping('express')">
                                    <div class="radio-label">
                                        <strong>Express Shipping</strong>
                                        <small>2-3 business days</small>
                                    </div>
                                </div>
                                <span class="radio-price">$19.99</span>
                            </label>
                        </div>
                    </div>
                </div>
            ` : `
                <div class="checkout-form">
                    <div class="form-section">
                        <h2 class="form-section-title">Payment Method</h2>
                        <form id="paymentForm" onsubmit="handlePaymentSubmit(event)">
                            <div class="form-grid">
                                <div class="form-group form-group-full">
                                    <label class="form-label" for="cardNumber">Card Number *</label>
                                    <input class="form-input" id="cardNumber" placeholder="1234 5678 9012 3456" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="expiry">Expiry Date *</label>
                                    <input class="form-input" id="expiry" placeholder="MM/YY" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="cvv">CVV *</label>
                                    <input class="form-input" id="cvv" placeholder="123" required>
                                </div>
                                <div class="form-group form-group-full">
                                    <label class="form-label" for="cardName">Name on Card *</label>
                                    <input class="form-input" id="cardName" required>
                                </div>
                            </div>
                            <div class="checkout-buttons" style="margin-top: 1.5rem;">
                                <button type="button" class="btn btn-outline btn-lg" onclick="goBack()" style="flex: 1;">Back</button>
                                <button type="submit" class="btn btn-primary btn-lg" style="flex: 1;">Place Order</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;

            const html = `
                <h1 class="checkout-title">Checkout</h1>
                <div class="checkout-layout">
                    ${formHTML}
                    
                    <div class="order-summary" style="position: sticky; top: 80px;">
                        <h2 class="summary-title">Order Summary</h2>
                        <div style="display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1rem;">
                            ${cartItems.map(item => `
                                <div style="display: flex; justify-content: space-between; font-size: 0.875rem;">
                                    <span style="color: #6b7280;">${item.product.name} x${item.quantity}</span>
                                    <span>$${(item.product.price * item.quantity).toFixed(2)}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="summary-divider"></div>
                        <div class="summary-row">
                            <span class="summary-label">Subtotal</span>
                            <span class="summary-value">$${subtotal.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-label">Shipping</span>
                            <span class="summary-value">${shippingCost === 0 ? 'Free' : '$' + shippingCost.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-label">Tax</span>
                            <span class="summary-value">$${tax.toFixed(2)}</span>
                        </div>
                        <div class="summary-divider"></div>
                        <div class="summary-total">
                            <span class="summary-total-label">Total</span>
                            <span class="summary-total-value">$${total.toFixed(2)}</span>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('checkoutContent').innerHTML = html;
        }

        function displayConfirmation() {
            const cart = getCart();
            const cartItems = cart.items.map(item => {
                const product = products.find(p => p.id === item.productId);
                return { ...item, product };
            }).filter(item => item.product);

            const subtotal = cartItems.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
            const shippingCost = shippingMethod === 'express' ? 19.99 : (subtotal > 50 ? 0 : 9.99);
            const tax = subtotal * 0.08;
            const total = subtotal + shippingCost + tax;

            const html = `
                <div class="confirmation-page">
                    <svg class="confirmation-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <h1>Order Confirmed!</h1>
                    <p>Thank you for your purchase. We've sent a confirmation email with your order details.</p>
                    
                    <div class="confirmation-summary">
                        <h2>Order Summary</h2>
                        <div class="confirmation-items">
                            ${cartItems.map(item => `
                                <div class="confirmation-item">
                                    <span>${item.product.name} x${item.quantity}</span>
                                    <span>$${(item.product.price * item.quantity).toFixed(2)}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="confirmation-divider"></div>
                        <div class="confirmation-total">
                            <span>Total</span>
                            <span class="confirmation-total-value">$${total.toFixed(2)}</span>
                        </div>
                    </div>
                    
                    <div class="confirmation-buttons">
                        <a href="products.html" class="btn btn-primary btn-lg">Continue Shopping</a>
                        <a href="index.html" class="btn btn-outline btn-lg">Go to Home</a>
                    </div>
                </div>
            `;

            document.getElementById('checkoutContent').innerHTML = html;
        }

        function changeShipping(method) {
            shippingMethod = method;
            displayCheckout();
        }

        function handleShippingSubmit(event) {
            event.preventDefault();
            step = 'payment';
            displayCheckout();
            window.scrollTo(0, 0);
        }

        function handlePaymentSubmit(event) {
            event.preventDefault();
            step = 'confirmation';
            clearCart();
            showNotification('Order placed successfully!');
            displayCheckout();
            window.scrollTo(0, 0);
        }

        function goBack() {
            step = 'info';
            displayCheckout();
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
