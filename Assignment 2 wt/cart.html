<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - PC Parts Shop</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .cart-page {
            padding: 2rem 0;
            min-height: 60vh;
        }
        
        .cart-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
        }
        
        .cart-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .cart-item {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1.5rem;
        }
        
        .cart-item-content {
            display: flex;
            gap: 1.5rem;
        }
        
        .cart-item-image {
            width: 120px;
            height: 120px;
            background: #f3f4f6;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .cart-item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .cart-item-name {
            font-weight: 600;
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }
        
        .cart-item-description {
            font-size: 0.875rem;
            color: #6b7280;
        }
        
        .cart-item-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
        }
        
        .cart-item-quantity button {
            padding: 0.5rem 0.75rem;
            background: white;
            border: none;
            cursor: pointer;
        }
        
        .cart-item-quantity button:hover {
            background: #f3f4f6;
        }
        
        .cart-item-quantity span {
            padding: 0 0.75rem;
            font-weight: 600;
        }
        
        .cart-item-price-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .cart-item-price {
            font-size: 1.25rem;
            font-weight: bold;
        }
        
        .remove-btn {
            color: #ef4444;
            padding: 0.5rem;
            background: none;
            border: none;
            cursor: pointer;
        }
        
        .remove-btn:hover {
            opacity: 0.7;
        }
        
        .order-summary {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1.5rem;
            height: fit-content;
        }
        
        .summary-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        
        .summary-label {
            color: #6b7280;
        }
        
        .summary-value {
            font-weight: 600;
        }
        
        .free-shipping-note {
            font-size: 0.875rem;
            color: #2563eb;
            margin-bottom: 1rem;
        }
        
        .summary-divider {
            height: 1px;
            background: #e5e7eb;
            margin: 1.5rem 0;
        }
        
        .summary-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.125rem;
        }
        
        .summary-total-label {
            font-weight: bold;
        }
        
        .summary-total-value {
            font-weight: bold;
            color: #2563eb;
        }
        
        .summary-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .empty-cart {
            text-align: center;
            padding: 3rem 0;
        }
        
        .empty-cart-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 1rem;
            color: #d1d5db;
        }
        
        .empty-cart h2 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        
        .empty-cart p {
            color: #6b7280;
            margin-bottom: 2rem;
        }
        
        @media (min-width: 1024px) {
            .cart-layout {
                grid-template-columns: 2fr 1fr;
            }
            
            .order-summary {
                position: sticky;
                top: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <div class="logo-icon">PC</div>
                    <span class="logo-text">PC Parts Shop</span>
                </a>
                <nav class="desktop-nav">
                    <a href="products.html">All Products</a>
                    <a href="products.html?category=gpu">Graphics Cards</a>
                    <a href="products.html?category=cpu">Processors</a>
                    <a href="products.html?category=motherboard">Motherboards</a>
                </nav>
            </div>
            <div class="header-right">
                <div class="search-bar">
                    <input type="search" placeholder="Search products..." class="search-input">
                </div>
                <a href="cart.html" class="cart-button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-count" id="cartCount">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Cart Page -->
    <div class="cart-page">
        <div class="container">
            <h1 class="cart-title">Shopping Cart</h1>

            <div id="cartContent">
                <!-- Cart content will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                © 2026 PC Parts Shop. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="products-data.js"></script>
    <script src="cart.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            displayCart();
        });

        function displayCart() {
            const cart = getCart();
            const container = document.getElementById('cartContent');
            
            const cartItems = cart.items.map(item => {
                const product = products.find(p => p.id === item.productId);
                return { ...item, product };
            }).filter(item => item.product);

            if (cartItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <svg class="empty-cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        <h2>Your Cart is Empty</h2>
                        <p>Start adding some items to your cart to get started.</p>
                        <a href="products.html" class="btn btn-primary btn-lg">Browse Products</a>
                    </div>
                `;
                return;
            }

            const subtotal = cartItems.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
            const shipping = subtotal > 50 ? 0 : 9.99;
            const tax = subtotal * 0.08;
            const total = subtotal + shipping + tax;

            const cartItemsHTML = cartItems.map(item => `
                <div class="cart-item">
                    <div class="cart-item-content">
                        <a href="product-detail.html?id=${item.product.id}" class="cart-item-image">
                            <img src="${item.product.image}" alt="${item.product.name}">
                        </a>
                        <div class="cart-item-details">
                            <div>
                                <a href="product-detail.html?id=${item.product.id}" class="cart-item-name">${item.product.name}</a>
                                <p class="cart-item-description">${item.product.description}</p>
                            </div>
                            <div class="cart-item-actions">
                                <div class="cart-item-quantity">
                                    <button onclick="updateQuantity('${item.product.id}', ${item.quantity - 1})" ${item.quantity <= 1 ? 'disabled' : ''}>-</button>
                                    <span>${item.quantity}</span>
                                    <button onclick="updateQuantity('${item.product.id}', ${item.quantity + 1})">+</button>
                                </div>
                                <div class="cart-item-price-section">
                                    <div class="cart-item-price">$${(item.product.price * item.quantity).toFixed(2)}</div>
                                    <button class="remove-btn" onclick="handleRemoveItem('${item.product.id}')">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="cart-layout">
                    <div class="cart-items">
                        ${cartItemsHTML}
                    </div>
                    
                    <div class="order-summary">
                        <h2 class="summary-title">Order Summary</h2>
                        
                        <div class="summary-row">
                            <span class="summary-label">Subtotal</span>
                            <span class="summary-value">$${subtotal.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-label">Shipping</span>
                            <span class="summary-value">${shipping === 0 ? 'Free' : '$' + shipping.toFixed(2)}</span>
                        </div>
                        ${shipping > 0 ? `<p class="free-shipping-note">Add $${(50 - subtotal).toFixed(2)} more for free shipping!</p>` : ''}
                        <div class="summary-row">
                            <span class="summary-label">Tax</span>
                            <span class="summary-value">$${tax.toFixed(2)}</span>
                        </div>
                        
                        <div class="summary-divider"></div>
                        
                        <div class="summary-total">
                            <span class="summary-total-label">Total</span>
                            <span class="summary-total-value">$${total.toFixed(2)}</span>
                        </div>
                        
                        <div class="summary-buttons">
                            <a href="checkout.html" class="btn btn-primary btn-lg">Proceed to Checkout</a>
                            <a href="products.html" class="btn btn-outline btn-lg">Continue Shopping</a>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateQuantity(productId, newQuantity) {
            updateCartQuantity(productId, newQuantity);
            displayCart();
        }

        function handleRemoveItem(productId) {
            removeFromCart(productId);
            showNotification('Item removed from cart');
            displayCart();
        }
    </script>
</body>
</html>
